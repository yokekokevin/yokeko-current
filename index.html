<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Currents</title>
<meta name="description" content="Real-time current speed at Yokeko Point and Deception Pass Narrows">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Currents">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9f9f7;
    color: #1a1a1a;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
  }

  header {
    width: 100%;
    padding: 16px 20px 14px;
    background: #fff;
    border-bottom: 0.5px solid #e0ddd6;
  }

  .toggle-wrap {
    display: flex;
    background: #f2f0eb;
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }

  .toggle-btn {
    flex: 1;
    border: none;
    background: transparent;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 400;
    color: #888;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s;
    line-height: 1.3;
  }

  .toggle-btn .station-name {
    display: block;
    font-weight: 500;
    font-size: 14px;
    color: inherit;
  }

  .toggle-btn .station-sub {
    display: block;
    font-size: 11px;
    margin-top: 1px;
    opacity: 0.7;
  }

  .toggle-btn.active {
    background: #fff;
    color: #1a1a1a;
    box-shadow: 0 0.5px 2px rgba(0,0,0,0.08);
  }

  .toggle-btn.active .station-name { color: #1a1a1a; }

  .main-card {
    background: #fff;
    border-radius: 16px;
    border: 0.5px solid #e0ddd6;
    padding: 28px 28px 24px;
    margin: 16px 20px 0;
    width: calc(100% - 40px);
    max-width: 420px;
  }

  .direction-label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .direction-arrow {
    font-size: 18px;
    font-weight: 600;
    line-height: 1;
  }

  .direction-label.flood { color: #1D9E75; }
  .direction-label.ebb   { color: #D85A30; }
  .direction-label.slack { color: #888780; }

  .speed-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .speed-value {
    font-size: 72px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -2px;
    color: #1a1a1a;
  }

  .speed-unit {
    font-size: 20px;
    color: #888;
    font-weight: 400;
  }

  .trend {
    font-size: 13px;
    color: #999;
    margin-top: 6px;
    min-height: 18px;
  }

  .divider {
    border: none;
    border-top: 0.5px solid #e8e6e0;
    margin: 20px 0;
  }

  .next-events {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .event-cell {
    background: #f5f4f0;
    border-radius: 10px;
    padding: 12px 14px;
  }

  .event-label {
    font-size: 11px;
    color: #999;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .event-time {
    font-size: 17px;
    font-weight: 500;
    color: #1a1a1a;
  }

  .event-speed {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .mini-bar-wrap {
    margin: 20px 0 0;
    position: relative;
    height: 48px;
  }

  .mini-bar-track {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #eeece7;
    border-radius: 2px;
    overflow: visible;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .mini-bar-fill.flood { background: #1D9E75; }
  .mini-bar-fill.ebb   { background: #D85A30; }
  .mini-bar-fill.slack { background: #c0bdb5; }

  .mini-bar-cursor {
    position: absolute;
    bottom: -4px;
    width: 2px;
    height: 12px;
    background: #1a1a1a;
    border-radius: 1px;
    transform: translateX(-50%);
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 14px 20px 0;
    width: calc(100% - 40px);
    max-width: 420px;
  }

  .refresh-btn {
    flex: 1;
    background: #fff;
    border: 0.5px solid #e0ddd6;
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    color: #555;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }

  .refresh-btn:active { background: #f2f0eb; }

  .updated-time {
    flex: 1;
    font-size: 12px;
    color: #aaa;
    text-align: right;
    padding-right: 4px;
  }

  .loading-state, .error-state {
    padding: 60px 20px;
    text-align: center;
    color: #999;
    font-size: 15px;
    line-height: 1.6;
  }

  .error-state { color: #c0603a; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid #e0ddd6;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .install-banner {
    background: #f0f8f5;
    border: 0.5px solid #9FE1CB;
    border-radius: 10px;
    padding: 12px 16px;
    margin: 14px 20px 0;
    width: calc(100% - 40px);
    max-width: 420px;
    font-size: 13px;
    color: #0F6E56;
    line-height: 1.5;
    display: none;
  }

  .install-banner strong { font-weight: 500; }

  /* Transit / docking window panel */
  .window-card {
    border-radius: 16px;
    border: 0.5px solid;
    padding: 16px 20px;
    margin: 12px 20px 0;
    width: calc(100% - 40px);
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .window-card.go {
    background: #f0fdf8;
    border-color: #9FE1CB;
  }

  .window-card.no-go {
    background: #fff8f5;
    border-color: #f0c4b0;
  }

  .window-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .window-card.go  .window-dot { background: #1D9E75; }
  .window-card.no-go .window-dot { background: #D85A30; }

  .window-text {
    flex: 1;
  }

  .window-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .window-card.go    .window-label { color: #0F6E56; }
  .window-card.no-go .window-label { color: #a04020; }

  .window-detail {
    font-size: 15px;
    font-weight: 400;
    color: #1a1a1a;
  }

  .window-time {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="toggle-wrap" role="group" aria-label="Select station">
    <button class="toggle-btn active" id="btn-yokeko" onclick="switchStation('PUG1629')" aria-pressed="true">
      <span class="station-name">Yokeko Point</span>
      <span class="station-sub">7 ft depth</span>
    </button>
    <button class="toggle-btn" id="btn-deception" onclick="switchStation('PUG1701')" aria-pressed="false">
      <span class="station-name">Deception Pass</span>
      <span class="station-sub">Narrows</span>
    </button>
  </div>
</header>

<div id="content">
  <div class="loading-state">
    <div class="spinner"></div>
    Fetching current data…
  </div>
</div>

<div id="window-panel"></div>

<div class="status-row" id="status-row" style="display:none">
  <button class="refresh-btn" onclick="fetchAndRender()" aria-label="Refresh">
    ↻ Refresh
  </button>
  <div class="updated-time" id="updated-time"></div>
</div>

<div class="install-banner" id="install-banner">
  <strong>Add to home screen</strong> — tap the share button in your browser, then "Add to Home Screen" for one-tap access.
</div>

<script>
const DPAPI_BASE = 'https://api.tidesandcurrents.noaa.gov/dpapi/prod/webapi/currentPredictionsDownload';

// PUG1629 subordinate station redirects to PUG1701 — both use same bin
const STATION_IDS = {
  'PUG1629': 'PUG1701_18',
  'PUG1701': 'PUG1701_18'
};

const STATIONS = {
  'PUG1629': { label: 'Yokeko Point', btnId: 'btn-yokeko' },
  'PUG1701': { label: 'Deception Pass Narrows', btnId: 'btn-deception' }
};

let activeStation = 'PUG1629';

function switchStation(id) {
  if (id === activeStation) return;
  activeStation = id;
  Object.entries(STATIONS).forEach(([sid, cfg]) => {
    const btn = document.getElementById(cfg.btnId);
    btn.classList.toggle('active', sid === id);
    btn.setAttribute('aria-pressed', sid === id ? 'true' : 'false');
  });
  fetchAndRender();
}

function fmtTime(dateStr) {
  const d = new Date(dateStr.replace(' ', 'T'));
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function fmtUpdated(d) {
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
}

function buildUrl(station, date) {
  const pad = n => String(n).padStart(2,'0');
  const fmtDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const id = STATION_IDS[station];
  return `${DPAPI_BASE}?id=${id}&start_date=${fmtDate(date)}&range=1&date_timeUnits=am/pm&interval=MAX_SLACK&time_zone=LST_LDT&units=1&format=txt`;
}

// Parse the DPAPI plain-text response format
function parseText(text) {
  return text.split('\n')
    .filter(l => /^\d{4}-\d{2}-\d{2}/.test(l.trim()))
    .map(line => {
      const parts = line.trim().split(/\s+/);
      const dateStr = parts[0];
      const timeStr = parts[1] + ' ' + parts[2];
      const speed   = parseFloat(parts[3]);
      const isoStr  = `${dateStr}T${to24h(timeStr)}`;
      const t       = new Date(isoStr);
      const type    = Math.abs(speed) < 0.1 ? 'slack' : (speed > 0 ? 'flood' : 'ebb');
      return { t, raw: `${dateStr} ${timeStr}`, speed, type };
    }).filter(e => !isNaN(e.t));
}

function to24h(timeStr) {
  const [time, meridiem] = timeStr.split(' ');
  let [h, m] = time.split(':').map(Number);
  if (meridiem === 'PM' && h !== 12) h += 12;
  if (meridiem === 'AM' && h === 12) h = 0;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`;
}

// ── Cache helpers ────────────────────────────────────────────────────────────
const CACHE_KEY     = 'yokeko_events_v3';
const CACHE_MAX_AGE = 12 * 60 * 60 * 1000; // 12 hours

function saveCache(station, events) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      station,
      fetchedAt: Date.now(),
      events: events.map(e => ({ t: e.t.getTime(), raw: e.raw, speed: e.speed, type: e.type }))
    }));
  } catch(e) {}
}

function loadCache(station) {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const payload = JSON.parse(raw);
    if (payload.station !== station) return null;
    if (Date.now() - payload.fetchedAt > CACHE_MAX_AGE) return null;
    const events = payload.events.map(e => ({ ...e, t: new Date(e.t) }));
    const now = Date.now();
    const hasPast   = events.some(e => e.t.getTime() <= now);
    const hasFuture = events.some(e => e.t.getTime() >  now);
    if (!hasPast || !hasFuture) return null;
    return events;
  } catch(e) { return null; }
}

// ── Fetch: two requests (today + tomorrow), merged and sorted ────────────────
async function fetchOnce(station) {
  const now      = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);

  const [r1, r2] = await Promise.all([
    fetch(buildUrl(station, now)),
    fetch(buildUrl(station, tomorrow))
  ]);

  if (!r1.ok || !r2.ok) throw new Error(`HTTP ${r1.status}/${r2.status}`);

  const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
  const events = [...parseText(t1), ...parseText(t2)]
    .sort((a, b) => a.t - b.t)
    .filter((e, i, arr) => i === 0 || e.t.getTime() !== arr[i-1].t.getTime()); // dedupe

  if (!events.length) throw new Error('No prediction data returned.');
  return events;
}

function classifyEvent(e) {
  if (e.type === 'slack') return 'slack';
  return e.speed > 0 ? 'flood' : 'ebb';
}

function interpolateSpeed(before, after, now) {
  const t0 = before.t.getTime();
  const t1 = after.t.getTime();
  const tn = now.getTime();
  const fraction = (tn - t0) / (t1 - t0);
  const s0 = before.speed;
  const s1 = after.speed;
  return s0 + (s1 - s0) * (0.5 - 0.5 * Math.cos(Math.PI * fraction));
}

// Station-specific comfort thresholds
const THRESHOLDS = {
  'PUG1629': { label: 'Docking',  check: (raw) => raw <= 1.0 },  // ebb always ok, flood ≤ 1.0 kt
  'PUG1701': { label: 'Transit',  check: (raw) => Math.abs(raw) <= 4.0 }
};

// Walk cosine curve across ALL event pairs (including current one) to find next threshold crossing
function findThresholdCrossing(events, currentlyOk, thresholdCheck) {
  const now = Date.now();
  const STEP = 60 * 1000;

  // Include the event just before now as seg0 so we scan the current segment too
  const pastEvents   = events.filter(e => e.t.getTime() <= now);
  const futureEvents = events.filter(e => e.t.getTime() >  now);
  if (pastEvents.length === 0 || futureEvents.length === 0) return null;

  // Build full sequence: last past event + all future events
  const anchors = [pastEvents[pastEvents.length - 1], ...futureEvents];

  for (let i = 0; i < anchors.length - 1; i++) {
    const seg0 = anchors[i];
    const seg1 = anchors[i + 1];
    const t0 = seg0.t.getTime();
    const t1 = seg1.t.getTime();
    const s0 = seg0.speed;
    const s1 = seg1.speed;
    const startT = Math.max(now + STEP, t0 + STEP);

    for (let t = startT; t <= t1; t += STEP) {
      const frac = (t - t0) / (t1 - t0);
      const spd  = s0 + (s1 - s0) * (0.5 - 0.5 * Math.cos(Math.PI * frac));
      const ok   = thresholdCheck(spd);
      if (ok !== currentlyOk) return new Date(t);
    }
    // Do NOT update currentlyOk — always compare against current state
  }
  return null;
}

function fmtCountdown(ms) {
  const totalMins = Math.round(ms / 60000);
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function fmtClock(date) {
  return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function renderWindowPanel(events, rawSpeed, station) {
  const cfg = THRESHOLDS[station];
  if (!cfg) { document.getElementById('window-panel').innerHTML = ''; return; }

  const now = Date.now();
  const isOk = cfg.check(rawSpeed);
  const crossing = findThresholdCrossing(events, isOk, cfg.check);
  const panel = document.getElementById('window-panel');

  if (isOk) {
    if (crossing) {
      const remaining = fmtCountdown(crossing - now);
      panel.innerHTML = `
        <div class="window-card go">
          <div class="window-dot"></div>
          <div class="window-text">
            <div class="window-label">${cfg.label} window open</div>
            <div class="window-detail">Open until ${fmtClock(crossing)}</div>
            <div class="window-time">${remaining} remaining</div>
          </div>
        </div>`;
    } else {
      panel.innerHTML = `
        <div class="window-card go">
          <div class="window-dot"></div>
          <div class="window-text">
            <div class="window-label">${cfg.label} window open</div>
            <div class="window-detail">No threshold crossing in forecast</div>
          </div>
        </div>`;
    }
  } else {
    if (crossing) {
      const wait = fmtCountdown(crossing - now);
      panel.innerHTML = `
        <div class="window-card no-go">
          <div class="window-dot"></div>
          <div class="window-text">
            <div class="window-label">${cfg.label} window closed</div>
            <div class="window-detail">Opens at ${fmtClock(crossing)}</div>
            <div class="window-time">In ${wait}</div>
          </div>
        </div>`;
    } else {
      panel.innerHTML = `
        <div class="window-card no-go">
          <div class="window-dot"></div>
          <div class="window-text">
            <div class="window-label">${cfg.label} window closed</div>
            <div class="window-detail">No opening found in forecast</div>
          </div>
        </div>`;
    }
  }
}

function render(events) {
  const now = new Date();
  const past   = events.filter(e => e.t <= now);
  const future = events.filter(e => e.t > now);

  if (past.length === 0 || future.length === 0) {
    showError('Not enough data to calculate current speed. Try refreshing.');
    return;
  }

  const before = past[past.length - 1];
  const after  = future[0];
  const next2  = future.length > 1 ? future[1] : null;

  const rawSpeed = interpolateSpeed(before, after, now);
  const absSpeed = Math.abs(rawSpeed);
  const direction = absSpeed < 0.15 ? 'slack'
                  : rawSpeed > 0    ? 'flood' : 'ebb';

  const arrowLeft  = `<svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:4px;position:relative;top:2px"><line x1="21" y1="8" x2="1" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="9,1 1,8 9,15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const arrowRight = `<svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-left:4px;position:relative;top:2px"><line x1="1" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="13,1 21,8 13,15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const dirLabel = direction === 'flood'
    ? `${arrowLeft} Flooding`
    : direction === 'ebb'
    ? `Ebbing ${arrowRight}`
    : 'Near slack';

  const maxForBar = Math.max(Math.abs(before.speed), Math.abs(after.speed), 5);
  const barPct = Math.min(100, Math.round((absSpeed / maxForBar) * 100));

  const trendSign = Math.abs(after.speed) > Math.abs(before.speed) ? '▲' : '▼';
  const trendWord = Math.abs(after.speed) > Math.abs(before.speed) ? 'picking up' : 'easing';

  const nextLabel = classifyEvent(after) === 'slack' ? 'Next slack' :
                    after.speed > 0 ? 'Next max flood' : 'Next max ebb';
  const nextSpeedStr = classifyEvent(after) === 'slack' ? '≈ 0 kts'
                     : `${Math.abs(after.speed).toFixed(1)} kts`;

  const next2Label = next2 ? (classifyEvent(next2) === 'slack' ? 'Then slack' :
                    next2.speed > 0 ? 'Then max flood' : 'Then max ebb') : '';
  const next2SpeedStr = next2 ? (classifyEvent(next2) === 'slack' ? '≈ 0 kts'
                     : `${Math.abs(next2.speed).toFixed(1)} kts`) : '';

  const minsToNext = Math.round((after.t - now) / 60000);
  const hoursToNext = Math.floor(minsToNext / 60);
  const remainMins = minsToNext % 60;
  const countdownStr = hoursToNext > 0
    ? `${hoursToNext}h ${remainMins}m`
    : `${remainMins}m`;

  const cursorLeft = Math.round(
    ((now - before.t) / (after.t - before.t)) * 100
  );

  document.getElementById('content').innerHTML = `
    <div class="main-card">
      <div class="direction-label ${direction}">${dirLabel}</div>
      <div class="speed-row">
        <div class="speed-value">${absSpeed.toFixed(1)}</div>
        <div class="speed-unit">kts</div>
      </div>
      <div class="trend">${trendSign} ${trendWord} — ${countdownStr} to ${nextLabel.toLowerCase()}</div>

      <div class="mini-bar-wrap">
        <div class="mini-bar-track">
          <div class="mini-bar-fill ${direction}" style="width:${barPct}%"></div>
          <div class="mini-bar-cursor" style="left:${cursorLeft}%"></div>
        </div>
      </div>

      <hr class="divider">

      <div class="next-events">
        <div class="event-cell">
          <div class="event-label">${nextLabel}</div>
          <div class="event-time">${fmtTime(after.raw)}</div>
          <div class="event-speed">${nextSpeedStr}</div>
        </div>
        ${next2 ? `
        <div class="event-cell">
          <div class="event-label">${next2Label}</div>
          <div class="event-time">${fmtTime(next2.raw)}</div>
          <div class="event-speed">${next2SpeedStr}</div>
        </div>` : '<div></div>'}
      </div>
    </div>
  `;

  renderWindowPanel(events, rawSpeed, activeStation);
  document.getElementById('updated-time').textContent = `Updated ${fmtUpdated(now)}`;
  document.getElementById('status-row').style.display = 'flex';
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="error-state">${msg}</div>`;
  document.getElementById('status-row').style.display = 'flex';
}


async function fetchAndRender() {
  const station = activeStation;

  // Try cache first — show instantly with no spinner if available
  const cached = loadCache(station);
  if (cached) {
    render(cached);
    // Silently refresh in background if cache is over 1 hour old
    const payload = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
    const age = Date.now() - (payload.fetchedAt || 0);
    if (age > 60 * 60 * 1000) {
      fetchOnce(station).then(events => {
        if (station === activeStation) {
          saveCache(station, events);
          render(events);
        }
      }).catch(() => { /* silently ignore background refresh failure */ });
    }
    return;
  }

  // No usable cache — show loading spinner and fetch
  document.getElementById('content').innerHTML = `
    <div class="loading-state"><div class="spinner"></div>Fetching…</div>
  `;
  document.getElementById('status-row').style.display = 'none';

  const MAX_ATTEMPTS = 3;
  let lastErr = null;

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      const events = await fetchOnce(station);
      if (station !== activeStation) return;
      saveCache(station, events);
      render(events);
      return;
    } catch (err) {
      lastErr = err;
      if (attempt < MAX_ATTEMPTS) {
        document.getElementById('content').innerHTML = `
          <div class="loading-state"><div class="spinner"></div>Retrying… (${attempt}/${MAX_ATTEMPTS - 1})</div>
        `;
        await new Promise(r => setTimeout(r, 800 * attempt));
      }
    }
  }

  if (station === activeStation) {
    showError(`Couldn't load data after ${MAX_ATTEMPTS} tries.<br><small>${lastErr.message}</small><br><br>NOAA's server may be briefly unavailable — try refreshing in a moment.`);
  }
}

if (!window.matchMedia('(display-mode: standalone)').matches &&
    !window.navigator.standalone) {
  document.getElementById('install-banner').style.display = 'block';
}

fetchAndRender();
setInterval(fetchAndRender, 5 * 60 * 1000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
